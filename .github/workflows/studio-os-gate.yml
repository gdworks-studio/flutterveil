name: studio-os-gate

# Pre-merge gate for flutterveil (Flutter SDK package). Pre-merge half of
# the two-gate model (vault: references/production-readiness-system.md). One
# stable required check: `studio-os-gate / gate`.
#
# care: github context (github.base_ref) flows through env + quoted shell vars,
# never interpolated into a run block (shell-injection vector).

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Conflict markers / stray whitespace
        env:
          BASE_REF: ${{ github.base_ref }}
        run: git diff --check "origin/${BASE_REF}...HEAD"

  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Analyze
        run: flutter analyze
      - name: Tests
        run: flutter test

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: gitleaks (CLI image — no org license, no PR API)
        run: docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks:latest dir /repo --redact --no-banner

  sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Semgrep (native android/ios/macos + general security rules)
        run: |
          pip install --quiet semgrep
          semgrep scan --error --config p/ci --config p/secrets

  deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: OSV-Scanner (pubspec.lock)
        run: |
          curl -sSfL "https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64" -o osv-scanner
          chmod +x osv-scanner
          ./osv-scanner --lockfile=pubspec.lock

  risk-router:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Classify blast radius (auth / payments / deletion / migrations)
        env:
          BASE_REF: ${{ github.base_ref }}
        run: python3 .github/scripts/risk_router.py "origin/${BASE_REF}"

  gate:
    runs-on: ubuntu-latest
    needs: [hygiene, flutter, secrets-scan, sast, deps, risk-router]
    if: always()
    steps:
      - name: Verdict
        run: |
          results="${{ needs.hygiene.result }} ${{ needs.flutter.result }} ${{ needs.secrets-scan.result }} ${{ needs.sast.result }} ${{ needs.deps.result }} ${{ needs.risk-router.result }}"
          echo "Job results: $results"
          for r in $results; do
            if [ "$r" != "success" ]; then
              echo "::error::studio-os-gate blocked — a required job did not pass."
              exit 1
            fi
          done
          echo "studio-os-gate: all required jobs passed."
